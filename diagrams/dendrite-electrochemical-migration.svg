<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="monospace" font-size="12">
  <title>Electrochemical Migration and Dendrite Growth Between Traces</title>
  <rect width="800" height="500" fill="#fafafa" stroke="#ccc"/>

  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c62828"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1565c0"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Electrochemical Migration — Dendrite Growth Between FPC Traces</text>
  <text x="400" y="42" text-anchor="middle" font-size="10" fill="#666">How cola residue creates permanent conductive bridges under bias voltage (3.3 V)</text>

  <!-- ═══ STEP 1: Dissolution at Anode ═══ -->
  <rect x="30" y="65" width="230" height="195" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.5"/>
  <text x="145" y="85" text-anchor="middle" font-size="11" font-weight="bold" fill="#b71c1c">Step 1: Dissolution</text>
  <text x="145" y="100" text-anchor="middle" font-size="9" fill="#c62828">at anode trace (+)</text>

  <!-- Anode trace -->
  <rect x="50" y="120" width="30" height="120" rx="2" fill="#ef6c00" stroke="#bf360c" stroke-width="1.5"/>
  <text x="65" y="185" text-anchor="middle" font-size="9" fill="#fff" transform="rotate(-90 65 185)">Cu ANODE (+)</text>

  <!-- Residue film between traces -->
  <rect x="80" y="120" width="100" height="120" rx="2" fill="#795548" fill-opacity="0.12" stroke="#4e342e" stroke-dasharray="4,3"/>
  <text x="130" y="140" text-anchor="middle" font-size="8" fill="#4e342e">cola residue</text>
  <text x="130" y="152" text-anchor="middle" font-size="8" fill="#4e342e">electrolyte</text>

  <!-- Cathode trace -->
  <rect x="180" y="120" width="30" height="120" rx="2" fill="#ef6c00" stroke="#bf360c" stroke-width="1.5"/>
  <text x="195" y="185" text-anchor="middle" font-size="9" fill="#fff" transform="rotate(-90 195 185)">Cu CATHODE (−)</text>

  <!-- Dissolution arrows from anode -->
  <line x1="80" y1="165" x2="110" y2="165" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="80" y1="185" x2="110" y2="185" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="80" y1="205" x2="110" y2="205" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- Cu²⁺ labels -->
  <text x="100" y="160" font-size="8" fill="#c62828">Cu²⁺</text>
  <text x="100" y="200" font-size="8" fill="#c62828">Cu²⁺</text>

  <!-- Reaction -->
  <text x="145" y="252" text-anchor="middle" font-size="9" fill="#c62828" font-weight="bold">Cu → Cu²⁺ + 2e⁻</text>

  <!-- ═══ STEP 2: Ion Migration ═══ -->
  <rect x="280" y="65" width="230" height="195" rx="6" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="395" y="85" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Step 2: Migration</text>
  <text x="395" y="100" text-anchor="middle" font-size="9" fill="#ef6c00">Cu²⁺ ions move toward cathode</text>

  <!-- Two traces -->
  <rect x="300" y="120" width="30" height="120" rx="2" fill="#ef6c00" stroke="#bf360c" stroke-width="1.5"/>
  <text x="315" y="150" text-anchor="middle" font-size="7" fill="#fff">+</text>
  <rect x="460" y="120" width="30" height="120" rx="2" fill="#ef6c00" stroke="#bf360c" stroke-width="1.5"/>
  <text x="475" y="150" text-anchor="middle" font-size="7" fill="#fff">−</text>

  <!-- Electrolyte -->
  <rect x="330" y="120" width="130" height="120" rx="2" fill="#795548" fill-opacity="0.12" stroke="#4e342e" stroke-dasharray="4,3"/>

  <!-- Electric field arrow -->
  <line x1="340" y1="135" x2="450" y2="135" stroke="#1565c0" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowBlue)"/>
  <text x="395" y="130" text-anchor="middle" font-size="8" fill="#1565c0">E field (3.3 V)</text>

  <!-- Ion migration paths -->
  <circle cx="360" cy="165" r="5" fill="#ffcc80" stroke="#ef6c00"/>
  <text x="360" y="168" text-anchor="middle" font-size="6" fill="#bf360c">Cu²⁺</text>
  <circle cx="390" cy="175" r="5" fill="#ffcc80" stroke="#ef6c00"/>
  <text x="390" y="178" text-anchor="middle" font-size="6" fill="#bf360c">Cu²⁺</text>
  <circle cx="420" cy="170" r="5" fill="#ffcc80" stroke="#ef6c00"/>
  <text x="420" y="173" text-anchor="middle" font-size="6" fill="#bf360c">Cu²⁺</text>
  <circle cx="445" cy="180" r="5" fill="#ffcc80" stroke="#ef6c00"/>
  <text x="445" y="183" text-anchor="middle" font-size="6" fill="#bf360c">Cu²⁺</text>

  <!-- Migration arrows -->
  <path d="M 345 180 C 370 190, 420 185, 455 180" fill="none" stroke="#ef6c00" stroke-width="1.5" marker-end="url(#arrowRed)" stroke-dasharray="4,2"/>
  <path d="M 345 200 C 380 210, 430 200, 455 195" fill="none" stroke="#ef6c00" stroke-width="1.5" marker-end="url(#arrowRed)" stroke-dasharray="4,2"/>

  <!-- ═══ STEP 3: Deposition at Cathode ═══ -->
  <rect x="530" y="65" width="240" height="195" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="650" y="85" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">Step 3: Deposition</text>
  <text x="650" y="100" text-anchor="middle" font-size="9" fill="#2e7d32">Cu plates out at cathode → dendrite</text>

  <!-- Two traces -->
  <rect x="555" y="120" width="30" height="120" rx="2" fill="#ef6c00" stroke="#bf360c" stroke-width="1.5"/>
  <text x="570" y="150" text-anchor="middle" font-size="7" fill="#fff">+</text>
  <rect x="710" y="120" width="30" height="120" rx="2" fill="#ef6c00" stroke="#bf360c" stroke-width="1.5"/>
  <text x="725" y="150" text-anchor="middle" font-size="7" fill="#fff">−</text>

  <!-- Electrolyte -->
  <rect x="585" y="120" width="125" height="120" rx="2" fill="#795548" fill-opacity="0.08" stroke="#4e342e" stroke-dasharray="4,3"/>

  <!-- Dendrite growing from cathode toward anode -->
  <path d="M 710 170 L 690 168 L 675 172 L 660 167 L 645 170 L 635 165 L 620 168"
        fill="none" stroke="#ef6c00" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Dendrite branches -->
  <path d="M 675 172 L 670 160" fill="none" stroke="#ef6c00" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 660 167 L 658 178" fill="none" stroke="#ef6c00" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 645 170 L 640 158" fill="none" stroke="#ef6c00" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 635 165 L 632 175" fill="none" stroke="#ef6c00" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Dendrite label -->
  <text x="660" y="155" text-anchor="middle" font-size="8" fill="#2e7d32" font-weight="bold">Cu dendrite</text>
  <text x="660" y="195" text-anchor="middle" font-size="8" fill="#2e7d32">grows cathode → anode</text>

  <!-- Reaction -->
  <text x="650" y="252" text-anchor="middle" font-size="9" fill="#2e7d32" font-weight="bold">Cu²⁺ + 2e⁻ → Cu (plated)</text>

  <!-- ═══ STEP ARROWS ═══ -->
  <text x="267" y="165" text-anchor="middle" font-size="16" fill="#333">→</text>
  <text x="518" y="165" text-anchor="middle" font-size="16" fill="#333">→</text>

  <!-- ═══ RESULT: SHORT CIRCUIT ═══ -->
  <rect x="80" y="280" width="640" height="90" rx="6" fill="#ffcdd2" stroke="#c62828" stroke-width="2"/>
  <text x="400" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#b71c1c">Result: Permanent Conductive Bridge (Short Circuit)</text>

  <!-- Shorted traces illustration -->
  <rect x="140" y="315" width="24" height="40" rx="2" fill="#ef6c00" stroke="#bf360c"/>
  <text x="152" y="340" text-anchor="middle" font-size="8" fill="#fff">C7</text>
  <rect x="260" y="315" width="24" height="40" rx="2" fill="#ef6c00" stroke="#bf360c"/>
  <text x="272" y="340" text-anchor="middle" font-size="8" fill="#fff">Ca</text>

  <!-- Dendrite bridge -->
  <path d="M 164 330 L 180 328 L 195 332 L 210 327 L 225 330 L 240 326 L 255 330 L 260 330"
        fill="none" stroke="#c62828" stroke-width="2" stroke-linecap="round"/>
  <text x="210" y="320" text-anchor="middle" font-size="8" fill="#c62828" font-weight="bold">dendrite bridge</text>

  <!-- Symptom -->
  <text x="500" y="325" text-anchor="middle" font-size="10" fill="#333">Pressing key on col C7</text>
  <text x="500" y="340" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">→ also triggers col Ca and Cb</text>
  <text x="500" y="355" text-anchor="middle" font-size="10" fill="#333">= extra wrong characters appear</text>

  <!-- ═══ KEY FACTORS BOX ═══ -->
  <rect x="80" y="390" width="640" height="95" rx="5" fill="#f5f5f5" stroke="#bdbdbd"/>
  <text x="400" y="410" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Factors That Accelerate Dendrite Growth</text>

  <text x="100" y="432" font-size="9" fill="#333">• <tspan font-weight="bold">Bias voltage</tspan> — keyboard scanning at 3.3 V drives Cu²⁺ from anode to cathode</text>
  <text x="100" y="448" font-size="9" fill="#333">• <tspan font-weight="bold">Tight trace pitch</tspan> — ~0.5 mm gap at ZIF connector = short migration distance</text>
  <text x="100" y="464" font-size="9" fill="#333">• <tspan font-weight="bold">Hygroscopic residue</tspan> — dried cola re-absorbs moisture from air, reactivating the electrolyte</text>
  <text x="100" y="480" font-size="9" fill="#333">• <tspan font-weight="bold">Temperature cycling</tspan> — laptop heat/cool cycles cause condensation under residue film</text>
</svg>
