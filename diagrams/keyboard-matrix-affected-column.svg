<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="monospace" font-size="12">
  <title>MacBook Keyboard Matrix — Affected Column Highlighted</title>
  <rect width="700" height="400" fill="#fafafa" stroke="#ccc"/>

  <!-- Title -->
  <text x="350" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">MacBook Keyboard Matrix — Affected Column (6, Y, H, N)</text>

  <!-- Column wires (vertical) -->
  <g stroke="#bdbdbd" stroke-width="1" fill="none">
    <line x1="100" y1="40" x2="100" y2="320"/>
    <line x1="150" y1="40" x2="150" y2="320"/>
    <line x1="200" y1="40" x2="200" y2="320"/>
    <line x1="250" y1="40" x2="250" y2="320"/>
    <line x1="300" y1="40" x2="300" y2="320"/>
    <!-- Affected column highlighted -->
    <line x1="400" y1="40" x2="400" y2="320"/>
    <line x1="450" y1="40" x2="450" y2="320"/>
    <line x1="500" y1="40" x2="500" y2="320"/>
    <line x1="550" y1="40" x2="550" y2="320"/>
    <line x1="600" y1="40" x2="600" y2="320"/>
  </g>
  <!-- Affected column wire in red -->
  <line x1="350" y1="40" x2="350" y2="320" stroke="#d32f2f" stroke-width="3"/>

  <!-- Row wires (horizontal) -->
  <g stroke="#bdbdbd" stroke-width="1" fill="none">
    <line x1="60" y1="80" x2="640" y2="80"/>
    <line x1="60" y1="140" x2="640" y2="140"/>
    <line x1="60" y1="200" x2="640" y2="200"/>
    <line x1="60" y1="260" x2="640" y2="260"/>
  </g>

  <!-- Row labels -->
  <text x="50" y="84" text-anchor="end" font-size="10" fill="#616161">ROW 1</text>
  <text x="50" y="144" text-anchor="end" font-size="10" fill="#616161">ROW 2</text>
  <text x="50" y="204" text-anchor="end" font-size="10" fill="#616161">ROW 3</text>
  <text x="50" y="264" text-anchor="end" font-size="10" fill="#616161">ROW 4</text>

  <!-- Column labels -->
  <text x="100" y="38" text-anchor="middle" font-size="8" fill="#9e9e9e">C4</text>
  <text x="150" y="38" text-anchor="middle" font-size="8" fill="#9e9e9e">C5</text>
  <text x="200" y="38" text-anchor="middle" font-size="8" fill="#9e9e9e">C6</text>
  <text x="250" y="38" text-anchor="middle" font-size="8" fill="#9e9e9e">C7 adj</text>
  <text x="350" y="38" text-anchor="middle" font-size="9" font-weight="bold" fill="#d32f2f">C7 ★</text>
  <text x="450" y="38" text-anchor="middle" font-size="8" fill="#9e9e9e">C8 adj</text>
  <text x="500" y="38" text-anchor="middle" font-size="8" fill="#9e9e9e">C9</text>
  <text x="550" y="38" text-anchor="middle" font-size="8" fill="#9e9e9e">C10</text>
  <text x="600" y="38" text-anchor="middle" font-size="8" fill="#9e9e9e">C11</text>

  <!-- Normal keys (grey) -->
  <g>
    <rect x="82" y="65" width="36" height="30" rx="4" fill="#e0e0e0" stroke="#9e9e9e"/>
    <text x="100" y="84" text-anchor="middle" font-size="11" fill="#333">5</text>

    <rect x="132" y="65" width="36" height="30" rx="4" fill="#e0e0e0" stroke="#9e9e9e"/>
    <text x="150" y="84" text-anchor="middle" font-size="11" fill="#333">T</text>

    <rect x="182" y="65" width="36" height="30" rx="4" fill="#e0e0e0" stroke="#9e9e9e"/>
    <text x="200" y="84" text-anchor="middle" font-size="11" fill="#333">R</text>

    <rect x="82" y="125" width="36" height="30" rx="4" fill="#e0e0e0" stroke="#9e9e9e"/>
    <text x="100" y="144" text-anchor="middle" font-size="11" fill="#333">G</text>

    <rect x="132" y="125" width="36" height="30" rx="4" fill="#e0e0e0" stroke="#9e9e9e"/>
    <text x="150" y="144" text-anchor="middle" font-size="11" fill="#333">F</text>

    <rect x="182" y="125" width="36" height="30" rx="4" fill="#e0e0e0" stroke="#9e9e9e"/>
    <text x="200" y="144" text-anchor="middle" font-size="11" fill="#333">D</text>

    <rect x="82" y="185" width="36" height="30" rx="4" fill="#e0e0e0" stroke="#9e9e9e"/>
    <text x="100" y="204" text-anchor="middle" font-size="11" fill="#333">B</text>

    <rect x="132" y="185" width="36" height="30" rx="4" fill="#e0e0e0" stroke="#9e9e9e"/>
    <text x="150" y="204" text-anchor="middle" font-size="11" fill="#333">V</text>

    <rect x="182" y="185" width="36" height="30" rx="4" fill="#e0e0e0" stroke="#9e9e9e"/>
    <text x="200" y="204" text-anchor="middle" font-size="11" fill="#333">C</text>
  </g>

  <!-- AFFECTED KEYS (red highlight) -->
  <g>
    <rect x="332" y="65" width="36" height="30" rx="4" fill="#ffcdd2" stroke="#d32f2f" stroke-width="2"/>
    <text x="350" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#b71c1c">6</text>

    <rect x="332" y="125" width="36" height="30" rx="4" fill="#ffcdd2" stroke="#d32f2f" stroke-width="2"/>
    <text x="350" y="144" text-anchor="middle" font-size="13" font-weight="bold" fill="#b71c1c">Y</text>

    <rect x="332" y="185" width="36" height="30" rx="4" fill="#ffcdd2" stroke="#d32f2f" stroke-width="2"/>
    <text x="350" y="204" text-anchor="middle" font-size="13" font-weight="bold" fill="#b71c1c">H</text>

    <rect x="332" y="245" width="36" height="30" rx="4" fill="#ffcdd2" stroke="#d32f2f" stroke-width="2"/>
    <text x="350" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#b71c1c">N</text>
  </g>

  <!-- More normal keys -->
  <g>
    <rect x="432" y="65" width="36" height="30" rx="4" fill="#e0e0e0" stroke="#9e9e9e"/>
    <text x="450" y="84" text-anchor="middle" font-size="11" fill="#333">7</text>

    <rect x="482" y="65" width="36" height="30" rx="4" fill="#e0e0e0" stroke="#9e9e9e"/>
    <text x="500" y="84" text-anchor="middle" font-size="11" fill="#333">8</text>

    <rect x="432" y="125" width="36" height="30" rx="4" fill="#e0e0e0" stroke="#9e9e9e"/>
    <text x="450" y="144" text-anchor="middle" font-size="11" fill="#333">U</text>

    <rect x="482" y="125" width="36" height="30" rx="4" fill="#e0e0e0" stroke="#9e9e9e"/>
    <text x="500" y="144" text-anchor="middle" font-size="11" fill="#333">I</text>

    <rect x="432" y="185" width="36" height="30" rx="4" fill="#e0e0e0" stroke="#9e9e9e"/>
    <text x="450" y="204" text-anchor="middle" font-size="11" fill="#333">J</text>

    <rect x="482" y="185" width="36" height="30" rx="4" fill="#e0e0e0" stroke="#9e9e9e"/>
    <text x="500" y="204" text-anchor="middle" font-size="11" fill="#333">K</text>

    <rect x="432" y="245" width="36" height="30" rx="4" fill="#e0e0e0" stroke="#9e9e9e"/>
    <text x="450" y="264" text-anchor="middle" font-size="11" fill="#333">M</text>
  </g>

  <!-- Legend / explanation -->
  <rect x="60" y="330" width="580" height="60" rx="6" fill="#fff3e0" stroke="#ff9800"/>
  <text x="350" y="350" text-anchor="middle" font-size="10" fill="#e65100">Column C7 (red) is shared by keys 6, Y, H, N. Conductive residue on this trace</text>
  <text x="350" y="365" text-anchor="middle" font-size="10" fill="#e65100">shorts it to adjacent column C6 or C8, so pressing any affected key also triggers</text>
  <text x="350" y="380" text-anchor="middle" font-size="10" fill="#e65100">a signal on the bridged column → keyboard controller reports multiple characters.</text>
</svg>
