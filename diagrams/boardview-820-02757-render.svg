  <text x="1066" y="406" font-size="10" fill="#1565c0">plus adjacent regulators / interface ICs.</text>
  <line x1="1050" y1="392" x2="988" y2="474" stroke="#1565c0" stroke-width="1.8"/>

  <rect x="1050" y="464" width="300" height="78" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="1066" y="486" font-size="11" font-weight="bold" fill="#4a148c">Dense connector / low-speed I/O edge</text>
  <text x="1066" y="504" font-size="10" fill="#6a1b9a">Useful for future illustrations that annotate keyboard,</text>
  <text x="1066" y="520" font-size="10" fill="#6a1b9a">trackpad, and other flex-connector neighborhoods.</text>
  <line x1="1050" y1="502" x2="1180" y2="506" stroke="#6a1b9a" stroke-width="1.8"/>

  <rect x="1050" y="578" width="300" height="76" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="1066" y="600" font-size="11" font-weight="bold" fill="#b71c1c">Practical takeaway for this incident</text>
  <text x="1066" y="618" font-size="10" fill="#c62828">The schematics improve illustration quality and location</text>
  <text x="1066" y="634" font-size="10" fill="#c62828">confidence, but microscope inspection still decides whether</text>
  <text x="1066" y="650" font-size="10" fill="#c62828">the actual spill damage sits at a connector, flex, or IC area.</text>

  <rect x="70" y="680" width="1280" height="160" rx="8" fill="#fff" stroke="#bdbdbd"/>
  <text x="710" y="708" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Interpretation Notes</text>
  <text x="96" y="734" font-size="10" fill="#333">1. This is a presentation-quality vector render meant for README use; it is cleaner and more zoom-friendly than the raw screenshot.</text>
  <text x="96" y="754" font-size="10" fill="#333">2. It does not replace the original boardview PNGs or the interactive `.brd` file in OpenBoardView; those remain the authoritative layout references.</text>
  <text x="96" y="774" font-size="10" fill="#333">3. The new boardview/schematic data mainly improves confidence when drawing future connector, controller, and signal-path illustrations.</text>
  <text x="96" y="794" font-size="10" fill="#333">4. The spill diagnosis itself still depends on direct physical evidence: residue location, corrosion, continuity changes, and microscope inspection.</text>
  <text x="96" y="822" font-size="9" fill="#777">Not to scale. Derived from the committed boardview material for board 820-02757 and intended as a documentation overview, not as a manufacturing drawing.</text>
</svg>
