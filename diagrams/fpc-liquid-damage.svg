<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" font-family="monospace" font-size="12">
  <title>FPC Trace Contamination — Before and After Cola Spill</title>
  <rect width="700" height="450" fill="#fafafa" stroke="#ccc"/>

  <!-- Title -->
  <text x="350" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">FPC Column Trace Contamination — Cola Spill Effect</text>

  <!-- BEFORE section -->
  <text x="175" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">BEFORE — Normal Operation</text>

  <!-- FPC substrate -->
  <rect x="30" y="80" width="310" height="160" rx="4" fill="#e8f5e9" stroke="#2e7d32"/>

  <!-- Column traces (clean) -->
  <rect x="80" y="90" width="16" height="140" fill="#ffcc80" stroke="#e65100" stroke-width="1"/>
  <rect x="130" y="90" width="16" height="140" fill="#ffd54f" stroke="#f57f17" stroke-width="1"/>
  <rect x="180" y="90" width="16" height="140" fill="#ffcc80" stroke="#e65100" stroke-width="1"/>
  <rect x="230" y="90" width="16" height="140" fill="#ffcc80" stroke="#e65100" stroke-width="1"/>
  <rect x="280" y="90" width="16" height="140" fill="#ffcc80" stroke="#e65100" stroke-width="1"/>

  <!-- Labels -->
  <text x="88" y="85" text-anchor="middle" font-size="8" fill="#e65100">C6</text>
  <text x="138" y="85" text-anchor="middle" font-size="9" font-weight="bold" fill="#f57f17">C7</text>
  <text x="188" y="85" text-anchor="middle" font-size="8" fill="#e65100">C8</text>
  <text x="238" y="85" text-anchor="middle" font-size="8" fill="#e65100">C9</text>
  <text x="288" y="85" text-anchor="middle" font-size="8" fill="#e65100">C10</text>

  <!-- Key labels on C7 -->
  <text x="138" y="115" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">6</text>
  <text x="138" y="145" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Y</text>
  <text x="138" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">H</text>
  <text x="138" y="205" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">N</text>

  <!-- Clean gap between traces -->
  <line x1="100" y1="160" x2="126" y2="160" stroke="#2e7d32" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="113" y="155" text-anchor="middle" font-size="7" fill="#2e7d32">insulated gap</text>

  <!-- Status -->
  <rect x="40" y="245" width="290" height="20" rx="3" fill="#c8e6c9" stroke="#2e7d32"/>
  <text x="185" y="259" text-anchor="middle" font-size="10" fill="#1b5e20">✓ Each column isolated — pressing N outputs only N</text>

  <!-- AFTER section -->
  <text x="525" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">AFTER — Cola Residue Present</text>

  <!-- FPC substrate -->
  <rect x="380" y="80" width="310" height="160" rx="4" fill="#ffebee" stroke="#c62828"/>

  <!-- Column traces -->
  <rect x="430" y="90" width="16" height="140" fill="#ffcc80" stroke="#e65100" stroke-width="1"/>
  <rect x="480" y="90" width="16" height="140" fill="#ffd54f" stroke="#f57f17" stroke-width="1"/>
  <rect x="530" y="90" width="16" height="140" fill="#ffcc80" stroke="#e65100" stroke-width="1"/>
  <rect x="580" y="90" width="16" height="140" fill="#ffcc80" stroke="#e65100" stroke-width="1"/>
  <rect x="630" y="90" width="16" height="140" fill="#ffcc80" stroke="#e65100" stroke-width="1"/>

  <!-- Labels -->
  <text x="438" y="85" text-anchor="middle" font-size="8" fill="#e65100">C6</text>
  <text x="488" y="85" text-anchor="middle" font-size="9" font-weight="bold" fill="#f57f17">C7</text>
  <text x="538" y="85" text-anchor="middle" font-size="8" fill="#e65100">C8</text>
  <text x="588" y="85" text-anchor="middle" font-size="8" fill="#e65100">C9</text>
  <text x="638" y="85" text-anchor="middle" font-size="8" fill="#e65100">C10</text>

  <!-- Key labels -->
  <text x="488" y="115" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">6</text>
  <text x="488" y="145" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Y</text>
  <text x="488" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">H</text>
  <text x="488" y="205" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">N</text>

  <!-- Cola residue bridges -->
  <ellipse cx="473" cy="140" rx="30" ry="25" fill="rgba(198,40,40,0.2)" stroke="#c62828" stroke-width="1.5" stroke-dasharray="4,2"/>
  <ellipse cx="510" cy="185" rx="28" ry="20" fill="rgba(198,40,40,0.2)" stroke="#c62828" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Bridge lines -->
  <line x1="446" y1="135" x2="480" y2="135" stroke="#d32f2f" stroke-width="3"/>
  <line x1="496" y1="180" x2="530" y2="180" stroke="#d32f2f" stroke-width="3"/>

  <text x="460" y="128" font-size="8" fill="#c62828">dried cola</text>
  <text x="460" y="137" font-size="8" fill="#c62828">bridge</text>
  <text x="515" y="175" font-size="8" fill="#c62828">residue</text>
  <text x="515" y="184" font-size="8" fill="#c62828">bridge</text>

  <!-- Corrosion marks -->
  <circle cx="490" cy="110" r="3" fill="#8d6e63" stroke="#4e342e"/>
  <circle cx="485" cy="200" r="2.5" fill="#8d6e63" stroke="#4e342e"/>
  <circle cx="495" cy="160" r="2" fill="#8d6e63" stroke="#4e342e"/>
  <text x="505" y="110" font-size="7" fill="#4e342e">corrosion</text>

  <!-- Status -->
  <rect x="390" y="245" width="290" height="20" rx="3" fill="#ffcdd2" stroke="#c62828"/>
  <text x="535" y="259" text-anchor="middle" font-size="10" fill="#b71c1c">✗ C7 shorted to C6/C8 — N outputs N + / + ?</text>

  <!-- Explanation box -->
  <rect x="50" y="290" width="600" height="150" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="350" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">How cola residue causes multi-character output:</text>

  <text x="70" y="335" font-size="10" fill="#333">1. Cola liquid seeps between FPC column traces through capillary action</text>
  <text x="70" y="355" font-size="10" fill="#333">2. Water evaporates, leaving concentrated sugar + phosphoric acid film</text>
  <text x="70" y="375" font-size="10" fill="#333">3. Dried film bridges C7 (6/Y/H/N) to adjacent C6 or C8 traces</text>
  <text x="70" y="395" font-size="10" fill="#333">4. Pressing any C7 key activates C7 AND the bridged column → multiple chars</text>
  <text x="70" y="415" font-size="10" fill="#333">5. Phosphoric acid continues corroding copper traces even after drying</text>
  <text x="70" y="435" font-size="10" fill="#d32f2f" font-weight="bold">6. Corrosion worsens over days → symptoms progressively degrade</text>
</svg>
