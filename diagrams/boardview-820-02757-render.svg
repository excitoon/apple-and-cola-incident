  <text x="1066" y="250" font-size="11" font-weight="bold" fill="#e65100">U0600 — Apple M3 Pro SoC</text>
  <text x="1066" y="268" font-size="10" fill="#bf360c">Large central package visible in the boardview overview.</text>
  <text x="1066" y="284" font-size="10" fill="#bf360c">Schematics help map nearby support rails, buses,</text>
  <text x="1066" y="300" font-size="10" fill="#bf360c">and the surrounding logic/power clusters more reliably.</text>
