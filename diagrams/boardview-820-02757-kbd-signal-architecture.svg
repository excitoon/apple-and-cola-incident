<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="'Courier New', monospace">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a4"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c44"/>
    </marker>
  </defs>

  <rect width="1000" height="720" fill="#1a1a2e" rx="8"/>

  <text x="500" y="30" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">Board 820-02757 &#x2014; Keyboard Signal Architecture (decoded from .brd)</text>
  <text x="500" y="48" text-anchor="middle" fill="#888" font-size="11">All net names and connections extracted from committed boardview data</text>

  <!-- SoC / SMC area -->
  <rect x="40" y="80" width="200" height="140" fill="#223" stroke="#4af" stroke-width="2" rx="6"/>
  <text x="140" y="100" text-anchor="middle" fill="#4af" font-size="13" font-weight="bold">M3 Pro SoC</text>
  <text x="140" y="118" text-anchor="middle" fill="#aaa" font-size="10">(U0600)</text>
  <text x="60" y="140" fill="#adf" font-size="9">I2C_KBD_SCL (net 710)</text>
  <text x="60" y="155" fill="#adf" font-size="9">I2C_KBD_SDA (net 709)</text>
  <text x="60" y="170" fill="#fda" font-size="9">KBD_INT_L (net 711)</text>
  <text x="60" y="188" fill="#aaa" font-size="9">KBD_BKLT_PWM (net 776)</text>
  <text x="60" y="203" fill="#aaa" font-size="9">KBD_LAYOUT_DETECT (713)</text>

  <!-- IPD connector (3590) -->
  <rect x="340" y="80" width="260" height="160" fill="#223" stroke="#fa4" stroke-width="2" rx="6"/>
  <text x="470" y="100" text-anchor="middle" fill="#fa4" font-size="13" font-weight="bold">IPD Connector (3590)</text>
  <text x="470" y="118" text-anchor="middle" fill="#888" font-size="10">Board coords (4104&#x2013;4225, 5571&#x2013;5712)</text>
  <text x="355" y="138" fill="#adf" font-size="9">I2C_KBD_SCL &#x2192; keyboard module</text>
  <text x="355" y="153" fill="#adf" font-size="9">I2C_KBD_SDA &#x2192; keyboard module</text>
  <text x="355" y="168" fill="#fda" font-size="9">KBD_INT_L &#x2192; interrupt from keyboard</text>
  <text x="355" y="183" fill="#8f8" font-size="9">SPI_IPD_MOSI/MISO/CLK/CS &#x2192; touch</text>
  <text x="355" y="198" fill="#aaa" font-size="9">IPD_MCU_INT/RESET &#x2192; controller</text>
  <text x="355" y="213" fill="#aaa" font-size="9">IPD_TOUCH_CLK/INT &#x2192; trackpad</text>

  <!-- Lines SoC &#x2192; IPD -->
  <line x1="240" y1="140" x2="338" y2="138" stroke="#4af" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="240" y1="155" x2="338" y2="153" stroke="#4af" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="338" y1="168" x2="240" y2="170" stroke="#fa4" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Power regulators -->
  <rect x="700" y="80" width="270" height="120" fill="#223" stroke="#4a4" stroke-width="2" rx="6"/>
  <text x="835" y="100" text-anchor="middle" fill="#4a4" font-size="13" font-weight="bold">Keyboard Power</text>
  <text x="715" y="120" fill="#8f8" font-size="9">PP1V825_S2_HOLD_KBDLDO (net 721)</text>
  <text x="715" y="135" fill="#8f8" font-size="9">  &#x2192; LDO regulator &#x2192; SENSE lines</text>
  <text x="715" y="155" fill="#8f8" font-size="9">PP3V3_S2_HOLD_KBD_ISNS (net 755)</text>
  <text x="715" y="170" fill="#8f8" font-size="9">  &#x2192; 3.3V keyboard power</text>
  <text x="715" y="190" fill="#aaa" font-size="9">INA_KBD3V3 / INA_KBD1V8 monitors</text>

  <!-- JT200 connector -->
  <rect x="120" y="310" width="760" height="200" fill="#112" stroke="#f44" stroke-width="2.5" rx="6"/>
  <text x="500" y="330" text-anchor="middle" fill="#f44" font-size="14" font-weight="bold">JT200 &#x2014; Keyboard FPC Connector (36-pin ZIF)</text>
  <text x="500" y="348" text-anchor="middle" fill="#888" font-size="10">Component #3588 &#x2014; Board coords (4119&#x2013;4253, 6111&#x2013;6806)</text>

  <!-- Pin groups -->
  <rect x="135" y="360" width="95" height="60" fill="#333" stroke="#888" rx="3"/>
  <text x="182" y="377" text-anchor="middle" fill="#ccc" font-size="9" font-weight="bold">Pins 1&#x2013;6</text>
  <text x="182" y="391" text-anchor="middle" fill="#aaa" font-size="8">GND, SHIFT</text>
  <text x="182" y="403" text-anchor="middle" fill="#aaa" font-size="8">PP1V825, ID1/2</text>

  <rect x="240" y="360" width="110" height="60" fill="#224" stroke="#48f" stroke-width="2" rx="3"/>
  <text x="295" y="377" text-anchor="middle" fill="#48f" font-size="9" font-weight="bold">Pins 7&#x2013;10</text>
  <text x="295" y="391" text-anchor="middle" fill="#8af" font-size="8">SENSE group A</text>
  <text x="295" y="403" text-anchor="middle" fill="#8af" font-size="8">X7, X11, X6, X9</text>

  <!-- Bridging boundary 1 -->
  <rect x="350" y="355" width="5" height="70" fill="#f44" opacity="0.7"/>
  <text x="352" y="440" text-anchor="middle" fill="#f44" font-size="8" font-weight="bold">⚡1</text>

  <rect x="360" y="360" width="110" height="60" fill="#322" stroke="#f84" stroke-width="2" rx="3"/>
  <text x="415" y="377" text-anchor="middle" fill="#f84" font-size="9" font-weight="bold">Pins 11&#x2013;15</text>
  <text x="415" y="391" text-anchor="middle" fill="#fa8" font-size="8">DRIVE group A</text>
  <text x="415" y="403" text-anchor="middle" fill="#fa8" font-size="8">Y0,Y10,Y2,Y8,Y1</text>

  <!-- Bridging boundary 2 -->
  <rect x="470" y="355" width="5" height="70" fill="#f44" opacity="0.7"/>
  <text x="472" y="440" text-anchor="middle" fill="#f44" font-size="8" font-weight="bold">⚡2</text>

  <rect x="480" y="360" width="130" height="60" fill="#224" stroke="#48f" stroke-width="2" rx="3"/>
  <text x="545" y="377" text-anchor="middle" fill="#48f" font-size="9" font-weight="bold">Pins 16&#x2013;24</text>
  <text x="545" y="391" text-anchor="middle" fill="#8af" font-size="8">SENSE group B</text>
  <text x="545" y="403" text-anchor="middle" fill="#8af" font-size="8">X8..X0 (9 cols)</text>

  <!-- Bridging boundary 3 -->
  <rect x="610" y="355" width="5" height="70" fill="#f44" opacity="0.7"/>
  <text x="612" y="440" text-anchor="middle" fill="#f44" font-size="8" font-weight="bold">⚡3</text>

  <rect x="620" y="360" width="120" height="60" fill="#322" stroke="#f84" stroke-width="2" rx="3"/>
  <text x="680" y="377" text-anchor="middle" fill="#f84" font-size="9" font-weight="bold">Pins 25&#x2013;31</text>
  <text x="680" y="391" text-anchor="middle" fill="#fa8" font-size="8">DRIVE group B</text>
  <text x="680" y="403" text-anchor="middle" fill="#fa8" font-size="8">Y11..Y6 (7 rows)</text>

  <rect x="750" y="360" width="115" height="60" fill="#333" stroke="#888" rx="3"/>
  <text x="807" y="377" text-anchor="middle" fill="#ccc" font-size="9" font-weight="bold">Pins 32&#x2013;36</text>
  <text x="807" y="391" text-anchor="middle" fill="#aaa" font-size="8">CAP, PP3V3_AON</text>
  <text x="807" y="403" text-anchor="middle" fill="#aaa" font-size="8">OPT, CTRL, GND</text>

  <!-- Power connections to JT200 -->
  <line x1="835" y1="200" x2="835" y2="308" stroke="#4a4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowG)"/>
  <text x="845" y="265" fill="#4a4" font-size="8">PP1V825&#x2192;SENSE</text>

  <!-- IPD connector to JT200 (via internal FPC routing) -->
  <line x1="470" y1="242" x2="470" y2="308" stroke="#fa4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>
  <text x="480" y="280" fill="#fa4" font-size="8">via FPC internal</text>

  <!-- JT220 connector -->
  <rect x="120" y="550" width="380" height="100" fill="#112" stroke="#8a4" stroke-width="2" rx="6"/>
  <text x="310" y="570" text-anchor="middle" fill="#8a4" font-size="13" font-weight="bold">JT220 &#x2014; Keyboard Backlight Connector (12-pin)</text>
  <text x="310" y="588" text-anchor="middle" fill="#888" font-size="10">Component #3589 &#x2014; Coords (4119&#x2013;4253, 6899&#x2013;7121)</text>
  <text x="135" y="610" fill="#aaa" font-size="9">KBDLED_CATHODE1, KBDLED_CATHODE2</text>
  <text x="135" y="625" fill="#aaa" font-size="9">PPVOUT_KBDLED_CONN, NC×2, GND×7</text>
  <text x="135" y="640" fill="#f88" font-size="9">&#x2191; 93 board-units below JT200 &#x2014; in contamination path</text>

  <!-- Contamination flow -->
  <line x1="200" y1="512" x2="200" y2="548" stroke="#f44" stroke-width="2" stroke-dasharray="3,2" marker-end="url(#arrowR)"/>
  <text x="210" y="535" fill="#f44" font-size="8" font-weight="bold">cola drip path</text>

  <!-- Key findings box -->
  <rect x="550" y="550" width="420" height="155" fill="#1a2a1a" stroke="#4a4" stroke-width="1.5" rx="6"/>
  <text x="760" y="570" text-anchor="middle" fill="#4a4" font-size="12" font-weight="bold">Boardview Evidence Summary</text>
  <text x="565" y="592" fill="#8f8" font-size="9">✓ DRIVE/SENSE interleaving proven &#x2014; 3 bridging boundaries</text>
  <text x="565" y="608" fill="#8f8" font-size="9">✓ Separate I²C bus confirms controller NOT in matrix path</text>
  <text x="565" y="624" fill="#8f8" font-size="9">✓ PP1V825 LDO &#x2192; SENSE lines = voltage-divider mechanism</text>
  <text x="565" y="640" fill="#8f8" font-size="9">✓ INA current monitors could detect contamination leakage</text>
  <text x="565" y="656" fill="#f88" font-size="9">✓ JT220 backlight 93 units below = secondary risk zone</text>
  <text x="565" y="672" fill="#fda" font-size="9">✓ Physical separation: matrix at JT200, I²C at 3590</text>
  <text x="565" y="688" fill="#fda" font-size="9">  &#x2192; localizes fault to FPC/connector, not SoC/controller</text>
</svg>
