  <text x="1066" y="132" font-size="11" font-weight="bold" fill="#1b5e20">What exact boardview / schematics change</text>
  <text x="1066" y="150" font-size="10" fill="#2e7d32">• Better confidence about component placement</text>
  <text x="1066" y="166" font-size="10" fill="#2e7d32">• Better future annotations and signal-path drawings</text>
  <text x="1066" y="182" font-size="10" fill="#2e7d32">• Not, by themselves, proof of the liquid path or fault site</text>

