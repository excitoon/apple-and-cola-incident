<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="monospace" font-size="12">
  <title>FPC Cross-Section — Chemical Attack Zones Under Cola Exposure</title>
  <rect width="800" height="520" fill="#fafafa" stroke="#ccc"/>

  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">FPC Cross-Section — Chemical Attack Zones Under Cola Exposure</text>

  <!-- ═══ LAYER STACK (center of diagram) ═══ -->

  <!-- Coverlay (polyimide top) -->
  <rect x="60" y="140" width="340" height="28" rx="2" fill="#ffe082" stroke="#f9a825" stroke-width="1.5"/>
  <text x="230" y="158" text-anchor="middle" font-size="10" font-weight="bold" fill="#795548">Polyimide Coverlay</text>

  <!-- Copper trace layer -->
  <rect x="60" y="168" width="100" height="20" rx="1" fill="#ef6c00" stroke="#bf360c" stroke-width="1"/>
  <text x="110" y="182" text-anchor="middle" font-size="9" fill="#fff">Cu trace</text>
  <rect x="180" y="168" width="40" height="20" rx="1" fill="#e0e0e0" stroke="#9e9e9e"/>
  <text x="200" y="182" text-anchor="middle" font-size="8" fill="#616161">gap</text>
  <rect x="240" y="168" width="100" height="20" rx="1" fill="#ef6c00" stroke="#bf360c" stroke-width="1"/>
  <text x="290" y="182" text-anchor="middle" font-size="9" fill="#fff">Cu trace</text>

  <!-- Adhesive layer -->
  <rect x="60" y="188" width="340" height="14" rx="1" fill="#d1c4e9" stroke="#7e57c2"/>
  <text x="230" y="199" text-anchor="middle" font-size="9" fill="#4527a0">Adhesive</text>

  <!-- Polyimide base -->
  <rect x="60" y="202" width="340" height="28" rx="2" fill="#ffe082" stroke="#f9a825" stroke-width="1.5"/>
  <text x="230" y="220" text-anchor="middle" font-size="10" font-weight="bold" fill="#795548">Polyimide Base Film</text>

  <!-- Protected label -->
  <rect x="70" y="100" width="130" height="24" rx="3" fill="#c8e6c9" stroke="#2e7d32"/>
  <text x="135" y="116" text-anchor="middle" font-size="10" fill="#1b5e20">✓ PROTECTED ZONE</text>
  <line x1="135" y1="124" x2="135" y2="140" stroke="#2e7d32" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Shield icon on coverlay -->
  <text x="50" y="158" font-size="14" fill="#2e7d32">🛡</text>

  <!-- ═══ EXPOSED PAD AREA (right side) ═══ -->

  <!-- Exposed copper pad (no coverlay) -->
  <rect x="460" y="140" width="280" height="8" rx="1" fill="none" stroke="#bdbdbd" stroke-dasharray="4,3"/>
  <text x="600" y="135" text-anchor="middle" font-size="9" fill="#c62828" font-style="italic">no coverlay — pads exposed</text>

  <!-- ENIG plating on pads -->
  <rect x="470" y="148" width="60" height="6" rx="1" fill="#ffd54f" stroke="#f57f17" stroke-width="0.8"/>
  <text x="500" y="153" text-anchor="middle" font-size="6" fill="#e65100">Au</text>
  <rect x="540" y="148" width="60" height="6" rx="1" fill="#ffd54f" stroke="#f57f17" stroke-width="0.8"/>
  <text x="570" y="153" text-anchor="middle" font-size="6" fill="#e65100">Au</text>
  <rect x="610" y="148" width="60" height="6" rx="1" fill="#ffd54f" stroke="#f57f17" stroke-width="0.8"/>
  <text x="640" y="153" text-anchor="middle" font-size="6" fill="#e65100">Au</text>
  <rect x="680" y="148" width="50" height="6" rx="1" fill="#ffd54f" stroke="#f57f17" stroke-width="0.8"/>

  <!-- Nickel under gold -->
  <rect x="470" y="154" width="60" height="8" rx="1" fill="#b0bec5" stroke="#546e7a"/>
  <text x="500" y="162" text-anchor="middle" font-size="6" fill="#263238">Ni</text>
  <rect x="540" y="154" width="60" height="8" rx="1" fill="#b0bec5" stroke="#546e7a"/>
  <text x="570" y="162" text-anchor="middle" font-size="6" fill="#263238">Ni</text>
  <rect x="610" y="154" width="60" height="8" rx="1" fill="#b0bec5" stroke="#546e7a"/>
  <text x="640" y="162" text-anchor="middle" font-size="6" fill="#263238">Ni</text>
  <rect x="680" y="154" width="50" height="8" rx="1" fill="#b0bec5" stroke="#546e7a"/>

  <!-- Copper pads -->
  <rect x="470" y="162" width="60" height="18" rx="1" fill="#ef6c00" stroke="#bf360c"/>
  <text x="500" y="175" text-anchor="middle" font-size="8" fill="#fff">Cu pad</text>
  <rect x="540" y="162" width="60" height="18" rx="1" fill="#ef6c00" stroke="#bf360c"/>
  <text x="570" y="175" text-anchor="middle" font-size="8" fill="#fff">Cu pad</text>
  <rect x="610" y="162" width="60" height="18" rx="1" fill="#ef6c00" stroke="#bf360c"/>
  <text x="640" y="175" text-anchor="middle" font-size="8" fill="#fff">Cu pad</text>
  <rect x="680" y="162" width="50" height="18" rx="1" fill="#ef6c00" stroke="#bf360c"/>

  <!-- Gaps between pads -->
  <rect x="530" y="148" width="10" height="32" fill="#e0e0e0" stroke="none"/>
  <rect x="600" y="148" width="10" height="32" fill="#e0e0e0" stroke="none"/>
  <rect x="670" y="148" width="10" height="32" fill="#e0e0e0" stroke="none"/>

  <!-- Adhesive + base under pads -->
  <rect x="460" y="188" width="280" height="14" rx="1" fill="#d1c4e9" stroke="#7e57c2"/>
  <text x="600" y="199" text-anchor="middle" font-size="9" fill="#4527a0">Adhesive</text>
  <rect x="460" y="202" width="280" height="28" rx="2" fill="#ffe082" stroke="#f9a825" stroke-width="1.5"/>
  <text x="600" y="220" text-anchor="middle" font-size="10" font-weight="bold" fill="#795548">Polyimide Base Film</text>

  <!-- Danger label -->
  <rect x="480" y="100" width="240" height="24" rx="3" fill="#ffcdd2" stroke="#c62828"/>
  <text x="600" y="116" text-anchor="middle" font-size="10" fill="#b71c1c">✗ EXPOSED — VULNERABLE TO COLA</text>
  <line x1="600" y1="124" x2="600" y2="148" stroke="#c62828" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ═══ COLA RESIDUE LAYER (on top) ═══ -->
  <rect x="440" y="60" width="320" height="40" rx="6" fill="#795548" fill-opacity="0.25" stroke="#4e342e" stroke-dasharray="5,3"/>
  <text x="600" y="77" text-anchor="middle" font-size="10" fill="#3e2723" font-weight="bold">Cola residue film (H₃PO₄ + salts + organic)</text>
  <text x="600" y="92" text-anchor="middle" font-size="9" fill="#4e342e">hygroscopic — reabsorbs moisture from air</text>

  <!-- Drip lines from cola to pads -->
  <line x1="500" y1="100" x2="500" y2="148" stroke="#795548" stroke-width="1" stroke-dasharray="2,2" opacity="0.6"/>
  <line x1="570" y1="100" x2="570" y2="148" stroke="#795548" stroke-width="1" stroke-dasharray="2,2" opacity="0.6"/>
  <line x1="640" y1="100" x2="640" y2="148" stroke="#795548" stroke-width="1" stroke-dasharray="2,2" opacity="0.6"/>

  <!-- ═══ ATTACK CALLOUTS ═══ -->

  <!-- Attack 1: Gold pinhole undermining -->
  <rect x="460" y="260" width="280" height="65" rx="4" fill="#fff8e1" stroke="#ff8f00"/>
  <text x="475" y="278" font-size="10" fill="#e65100" font-weight="bold">❶ Gold pinhole undermining</text>
  <text x="475" y="293" font-size="9" fill="#795548">H₃PO₄ seeps through Au pinholes,</text>
  <text x="475" y="306" font-size="9" fill="#795548">dissolves Ni sublayer → "black pad"</text>
  <text x="475" y="319" font-size="8" fill="#546e7a">2Ni + O₂ + 4H₃PO₄ → 2Ni(H₂PO₄)₂ + 2H₂O</text>
  <line x1="500" y1="260" x2="500" y2="230" stroke="#ff8f00" stroke-width="1.2"/>
  <circle cx="500" cy="158" r="4" fill="none" stroke="#ff8f00" stroke-width="1.5"/>

  <!-- Attack 2: Inter-pad bridge -->
  <rect x="460" y="340" width="280" height="55" rx="4" fill="#fce4ec" stroke="#c62828"/>
  <text x="475" y="358" font-size="10" fill="#c62828" font-weight="bold">❷ Ionic bridge between pads</text>
  <text x="475" y="373" font-size="9" fill="#795548">Conductive electrolyte film shorts</text>
  <text x="475" y="386" font-size="9" fill="#795548">adjacent pads (~0.5 mm gap) → ghost keys</text>
  <!-- Bridge line between pads -->
  <line x1="530" y1="180" x2="540" y2="180" stroke="#c62828" stroke-width="2" stroke-dasharray="2,1"/>
  <text x="535" y="195" text-anchor="middle" font-size="7" fill="#c62828">bridge</text>

  <!-- Attack 3: Adhesive osmotic blistering -->
  <rect x="60" y="260" width="280" height="55" rx="4" fill="#f3e5f5" stroke="#7e57c2"/>
  <text x="75" y="278" font-size="10" fill="#6a1b9a" font-weight="bold">❸ Adhesive osmotic blistering</text>
  <text x="75" y="293" font-size="9" fill="#795548">Water + ions diffuse into adhesive;</text>
  <text x="75" y="306" font-size="9" fill="#795548">osmotic pressure delaminates Cu from PI</text>
  <line x1="200" y1="260" x2="200" y2="205" stroke="#7e57c2" stroke-width="1.2" stroke-dasharray="3,2"/>
  <circle cx="200" cy="195" r="4" fill="none" stroke="#7e57c2" stroke-width="1.5"/>

  <!-- Attack 4: Copper dissolution (where exposed) -->
  <rect x="60" y="340" width="280" height="55" rx="4" fill="#fff3e0" stroke="#ef6c00"/>
  <text x="75" y="358" font-size="10" fill="#e65100" font-weight="bold">❹ Exposed copper dissolution</text>
  <text x="75" y="373" font-size="9" fill="#795548">Acid strips Cu₂O passivation, then</text>
  <text x="75" y="386" font-size="9" fill="#795548">dissolves Cu via O₂-depolarized attack</text>

  <!-- Legend -->
  <rect x="60" y="420" width="680" height="85" rx="5" fill="#f5f5f5" stroke="#bdbdbd"/>
  <text x="400" y="440" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Layer Legend</text>
  <rect x="80" y="450" width="30" height="12" fill="#ffe082" stroke="#f9a825"/>
  <text x="120" y="461" font-size="9" fill="#333">Polyimide (chemically inert to cola)</text>
  <rect x="80" y="470" width="30" height="12" fill="#ef6c00" stroke="#bf360c"/>
  <text x="120" y="481" font-size="9" fill="#333">Copper (buried = safe; exposed = vulnerable)</text>
  <rect x="400" y="450" width="30" height="12" fill="#d1c4e9" stroke="#7e57c2"/>
  <text x="440" y="461" font-size="9" fill="#333">Adhesive (osmotic blistering risk)</text>
  <rect x="400" y="470" width="30" height="6" fill="#ffd54f" stroke="#f57f17"/>
  <rect x="400" y="476" width="30" height="6" fill="#b0bec5" stroke="#546e7a"/>
  <text x="440" y="481" font-size="9" fill="#333">ENIG: Au (top) + Ni (bottom) — pinhole risk</text>
</svg>
