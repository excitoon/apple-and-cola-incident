<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" font-family="monospace" font-size="12">
  <title>ZIF Connector — Three Views</title>
  <rect width="700" height="500" fill="#fafafa" stroke="#ccc"/>

  <!-- Title -->
  <text x="350" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">ZIF (Zero Insertion Force) Connector — Detail Views</text>

  <!-- VIEW 1: Top view, latch open -->
  <text x="180" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Top View — Latch Open</text>

  <!-- Socket body -->
  <rect x="50" y="70" width="260" height="80" rx="3" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>

  <!-- Latch (raised) -->
  <rect x="50" y="60" width="260" height="14" rx="2" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <text x="180" y="71" text-anchor="middle" font-size="9" fill="#0d47a1">↑ LATCH (raised/open) ↑</text>

  <!-- Contact pins row -->
  <g fill="#ffd54f" stroke="#f57f17" stroke-width="0.5">
    <rect x="70" y="100" width="8" height="20" rx="1"/>
    <rect x="85" y="100" width="8" height="20" rx="1"/>
    <rect x="100" y="100" width="8" height="20" rx="1"/>
    <rect x="115" y="100" width="8" height="20" rx="1"/>
    <rect x="130" y="100" width="8" height="20" rx="1"/>
    <rect x="145" y="100" width="8" height="20" rx="1"/>
    <rect x="160" y="100" width="8" height="20" rx="1"/>
    <rect x="175" y="100" width="8" height="20" rx="1"/>
    <rect x="190" y="100" width="8" height="20" rx="1"/>
    <rect x="205" y="100" width="8" height="20" rx="1"/>
    <rect x="220" y="100" width="8" height="20" rx="1"/>
    <rect x="235" y="100" width="8" height="20" rx="1"/>
    <rect x="250" y="100" width="8" height="20" rx="1"/>
    <rect x="265" y="100" width="8" height="20" rx="1"/>
    <rect x="280" y="100" width="8" height="20" rx="1"/>
  </g>
  <text x="180" y="95" text-anchor="middle" font-size="8" fill="#e65100">spring contacts (~0.5 mm pitch)</text>

  <!-- FPC insertion slot -->
  <rect x="60" y="130" width="240" height="10" fill="#fff" stroke="#9e9e9e" stroke-dasharray="3,2"/>
  <text x="180" y="155" text-anchor="middle" font-size="9" fill="#616161">← FPC slides in here →</text>

  <!-- VIEW 2: Top view, latch closed -->
  <text x="530" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Top View — Latch Closed</text>

  <!-- Socket body -->
  <rect x="400" y="70" width="260" height="80" rx="3" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>

  <!-- Latch (pressed down) -->
  <rect x="400" y="70" width="260" height="14" rx="2" fill="#a5d6a7" stroke="#2e7d32" stroke-width="2"/>
  <text x="530" y="81" text-anchor="middle" font-size="9" fill="#1b5e20">▼ LATCH (closed/locked) ▼</text>

  <!-- Contact pins clamped -->
  <g fill="#ffd54f" stroke="#f57f17" stroke-width="0.5">
    <rect x="420" y="95" width="8" height="25" rx="1"/>
    <rect x="435" y="95" width="8" height="25" rx="1"/>
    <rect x="450" y="95" width="8" height="25" rx="1"/>
    <rect x="465" y="95" width="8" height="25" rx="1"/>
    <rect x="480" y="95" width="8" height="25" rx="1"/>
    <rect x="495" y="95" width="8" height="25" rx="1"/>
    <rect x="510" y="95" width="8" height="25" rx="1"/>
    <rect x="525" y="95" width="8" height="25" rx="1"/>
    <rect x="540" y="95" width="8" height="25" rx="1"/>
    <rect x="555" y="95" width="8" height="25" rx="1"/>
    <rect x="570" y="95" width="8" height="25" rx="1"/>
    <rect x="585" y="95" width="8" height="25" rx="1"/>
    <rect x="600" y="95" width="8" height="25" rx="1"/>
    <rect x="615" y="95" width="8" height="25" rx="1"/>
    <rect x="630" y="95" width="8" height="25" rx="1"/>
  </g>

  <!-- FPC clamped -->
  <rect x="410" y="125" width="240" height="8" fill="#ffcc80" stroke="#e65100" stroke-width="1"/>
  <text x="530" y="148" text-anchor="middle" font-size="9" fill="#e65100">FPC clamped — contacts gripping pads</text>

  <!-- VIEW 3: Side cross-section -->
  <text x="350" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#6a1b9a">Side Cross-Section (latch closed)</text>

  <!-- Socket body outline -->
  <rect x="100" y="220" width="500" height="120" rx="4" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5"/>

  <!-- Latch -->
  <rect x="100" y="210" width="500" height="18" rx="3" fill="#ce93d8" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="350" y="223" text-anchor="middle" font-size="10" fill="#4a148c">latch (pressing down)</text>

  <!-- FPC ribbon -->
  <rect x="50" y="270" width="600" height="16" rx="2" fill="#ffe0b2" stroke="#e65100" stroke-width="1.5"/>
  <text x="30" y="282" text-anchor="end" font-size="9" fill="#bf360c">FPC</text>

  <!-- Gold pads on FPC (bottom side facing down into socket) -->
  <g fill="#ffd54f" stroke="#f57f17" stroke-width="0.5">
    <rect x="150" y="286" width="30" height="5"/>
    <rect x="200" y="286" width="30" height="5"/>
    <rect x="250" y="286" width="30" height="5"/>
    <rect x="300" y="286" width="30" height="5"/>
    <rect x="350" y="286" width="30" height="5"/>
    <rect x="400" y="286" width="30" height="5"/>
    <rect x="450" y="286" width="30" height="5"/>
    <rect x="500" y="286" width="30" height="5"/>
  </g>
  <text x="350" y="303" text-anchor="middle" font-size="8" fill="#f57f17">gold-plated copper pads on FPC underside</text>

  <!-- Spring contacts in socket -->
  <g fill="none" stroke="#6a1b9a" stroke-width="1.5">
    <path d="M 160 320 Q 165 295 170 320"/>
    <path d="M 210 320 Q 215 295 220 320"/>
    <path d="M 260 320 Q 265 295 270 320"/>
    <path d="M 310 320 Q 315 295 320 320"/>
    <path d="M 360 320 Q 365 295 370 320"/>
    <path d="M 410 320 Q 415 295 420 320"/>
    <path d="M 460 320 Q 465 295 470 320"/>
    <path d="M 510 320 Q 515 295 520 320"/>
  </g>
  <text x="350" y="335" text-anchor="middle" font-size="8" fill="#4a148c">spring contacts in socket body</text>

  <!-- PCB base -->
  <rect x="100" y="340" width="500" height="20" fill="#c8e6c9" stroke="#388e3c"/>
  <text x="350" y="354" text-anchor="middle" font-size="10" fill="#1b5e20">logic board PCB (solder pads connect to keyboard controller)</text>

  <!-- Contact force arrows -->
  <line x1="165" y1="235" x2="165" y2="270" stroke="#d32f2f" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="315" y1="235" x2="315" y2="270" stroke="#d32f2f" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="465" y1="235" x2="465" y2="270" stroke="#d32f2f" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="350" y="252" text-anchor="middle" font-size="9" fill="#d32f2f">↓ contact force from latch ↓</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d32f2f"/>
    </marker>
  </defs>

  <!-- Contamination note -->
  <rect x="100" y="375" width="500" height="50" rx="4" fill="#fff3e0" stroke="#ff9800"/>
  <text x="350" y="393" text-anchor="middle" font-size="10" fill="#e65100">Cola residue at the FPC-to-socket contact point can bridge adjacent pins,</text>
  <text x="350" y="408" text-anchor="middle" font-size="10" fill="#e65100">causing column trace C7 to short to C6 or C8 → extra characters on keypress.</text>

  <!-- Pitch annotation -->
  <line x1="150" y1="245" x2="200" y2="245" stroke="#333" stroke-width="0.5"/>
  <line x1="150" y1="242" x2="150" y2="248" stroke="#333"/>
  <line x1="200" y1="242" x2="200" y2="248" stroke="#333"/>
  <text x="175" y="242" text-anchor="middle" font-size="8" fill="#333">~0.5 mm pitch</text>

  <!-- Legend -->
  <text x="350" y="470" text-anchor="middle" font-size="10" fill="#616161">ZIF = Zero Insertion Force — FPC slides in without pushing; latch clamps it.</text>
  <text x="350" y="485" text-anchor="middle" font-size="10" fill="#616161">Misalignment by one pin position causes all column signals to shift → wrong characters.</text>
</svg>
