  <!-- Callouts -->
  <rect x="1048" y="98" width="304" height="98" rx="6" fill="#fff8e1" stroke="#ef6c00" stroke-width="2"/>
  <text x="1066" y="120" font-size="11" font-weight="bold" fill="#e65100">1. Central SoC / support cluster</text>
  <text x="1066" y="138" font-size="10" fill="#bf360c">The boardview clearly gives package placement and</text>
  <text x="1066" y="154" font-size="10" fill="#bf360c">nearby component neighborhoods around U0600.</text>
  <text x="1066" y="170" font-size="10" fill="#bf360c">Good for clean overview, power-region, and signal-path illustrations.</text>
  <line x1="1048" y1="148" x2="762" y2="360" stroke="#ef6c00" stroke-width="1.8"/>

  <rect x="1048" y="218" width="304" height="82" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="1066" y="240" font-size="11" font-weight="bold" fill="#0d47a1">2. Storage / regulator neighborhood</text>
  <text x="1066" y="258" font-size="10" fill="#1565c0">Another clean boardview-derived region for component</text>
  <text x="1066" y="274" font-size="10" fill="#1565c0">placement callouts and future fault-localisation diagrams.</text>
  <line x1="1048" y1="260" x2="1078" y2="488" stroke="#1565c0" stroke-width="1.8"/>

  <rect x="1048" y="320" width="304" height="96" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="1066" y="342" font-size="11" font-weight="bold" fill="#4a148c">3. Connector-rich right edge</text>
  <text x="1066" y="360" font-size="10" fill="#6a1b9a">Useful for future connector maps: keyboard, trackpad,</text>
  <text x="1066" y="376" font-size="10" fill="#6a1b9a">display, and other flex-neighborhood illustrations.</text>
  <text x="1066" y="392" font-size="10" fill="#6a1b9a">Boardview helps with placement, not full net semantics.</text>
  <line x1="1048" y1="368" x2="1276" y2="420" stroke="#6a1b9a" stroke-width="1.8"/>

  <rect x="1048" y="438" width="304" height="98" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="1066" y="460" font-size="11" font-weight="bold" fill="#b71c1c">4. Incident-relevant low-side connector area</text>
  <text x="1066" y="478" font-size="10" fill="#c62828">This is where boardview context helps us draw better</text>
  <text x="1066" y="494" font-size="10" fill="#c62828">connector/FPC relationship diagrams for the spill discussion.</text>
  <text x="1066" y="510" font-size="10" fill="#c62828">But the actual keyboard membrane path still sits off-board.</text>
  <line x1="1048" y1="492" x2="192" y2="470" stroke="#c62828" stroke-width="1.8"/>

  <rect x="1048" y="556" width="304" height="98" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="1066" y="578" font-size="11" font-weight="bold" fill="#1b5e20">5. Boardview ≠ full schematic</text>
  <text x="1066" y="596" font-size="10" fill="#2e7d32">The committed `.brd` gives board outline, refdes, and</text>
  <text x="1066" y="612" font-size="10" fill="#2e7d32">placement neighborhoods. For named nets, matrix lines,</text>
  <text x="1066" y="628" font-size="10" fill="#2e7d32">and exact circuit logic, we still need the separate PDF schematic.</text>
  <line x1="1048" y1="604" x2="520" y2="278" stroke="#2e7d32" stroke-width="1.8"/>

  <!-- Footer panel -->
  <rect x="70" y="680" width="1280" height="180" rx="8" fill="#fff" stroke="#bdbdbd"/>
  <text x="710" y="708" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">What this extra illustration adds</text>
  <text x="96" y="734" font-size="10" fill="#333">1. It answers the practical question "what more can we illustrate from the board file?" by marking the main board neighborhoods that are stable enough for documentation.</text>
  <text x="96" y="754" font-size="10" fill="#333">2. It is boardview-derived: package positions, edge connector regions, and major cluster relationships are taken from the committed boardview material, not invented from scratch.</text>
  <text x="96" y="774" font-size="10" fill="#333">3. It does not claim that the `.brd` alone exposes the full keyboard matrix or the exact unidirectional bridge mechanism; those require keyboard/top-case path data and schematic-level net naming.</text>
  <text x="96" y="794" font-size="10" fill="#333">4. It gives a clean base for future diagrams covering connector routing, controller neighborhoods, power islands, and incident-specific callouts without depending on raster screenshots.</text>
  <text x="96" y="822" font-size="10" fill="#333">5. In short: yes, we can add more illustrations from the board data — especially board-level maps and annotated zones — but not pretend the boardview is a complete readable schematic by itself.</text>
  <text x="96" y="848" font-size="9" fill="#777">Not to scale. Derived from the committed boardview material for board 820-02757 and intended as a documentation/annotation aid, not as a manufacturing drawing.</text>
</svg>
