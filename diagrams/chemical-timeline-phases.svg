<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="monospace" font-size="12">
  <title>Cola Damage Timeline — Three Chemical Phases</title>
  <rect width="800" height="600" fill="#fafafa" stroke="#ccc"/>

  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Coca-Cola Zero Damage Timeline — Three Chemical Phases</text>

  <!-- Timeline arrow -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="40%" style="stop-color:#ef6c00"/>
      <stop offset="100%" style="stop-color:#c62828"/>
    </linearGradient>
  </defs>
  <rect x="60" y="45" width="690" height="8" rx="4" fill="url(#grad1)" opacity="0.7"/>
  <line x1="60" y1="49" x2="755" y2="49" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="770" y="53" font-size="9" fill="#333">time</text>

  <!-- Phase markers on timeline -->
  <line x1="60" y1="40" x2="60" y2="58" stroke="#333" stroke-width="1.5"/>
  <text x="60" y="72" text-anchor="middle" font-size="9" fill="#333">0 sec</text>
  <line x1="280" y1="40" x2="280" y2="58" stroke="#333" stroke-width="1.5"/>
  <text x="280" y="72" text-anchor="middle" font-size="9" fill="#333">~minutes</text>
  <line x1="500" y1="40" x2="500" y2="58" stroke="#333" stroke-width="1.5"/>
  <text x="500" y="72" text-anchor="middle" font-size="9" fill="#333">~hours</text>
  <line x1="700" y1="40" x2="700" y2="58" stroke="#333" stroke-width="1.5"/>
  <text x="700" y="72" text-anchor="middle" font-size="9" fill="#333">days+</text>

  <!-- ═══ PHASE 1: WET ═══ -->
  <rect x="30" y="90" width="250" height="240" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="155" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">Phase 1: WET</text>
  <text x="155" y="126" text-anchor="middle" font-size="9" fill="#1565c0">(seconds to minutes)</text>

  <!-- Water droplet icon -->
  <circle cx="65" cy="112" r="8" fill="#42a5f5" opacity="0.5"/>
  <text x="65" y="116" text-anchor="middle" font-size="10">💧</text>

  <!-- Reactions list -->
  <text x="45" y="148" font-size="9" fill="#333" font-weight="bold">Cu₂O passivation stripped:</text>
  <text x="50" y="162" font-size="8" fill="#546e7a">Cu₂O + 2H₃PO₄ → 2CuH₂PO₄ + H₂O</text>

  <text x="45" y="180" font-size="9" fill="#333" font-weight="bold">Copper dissolves (O₂ attack):</text>
  <text x="50" y="194" font-size="8" fill="#546e7a">2Cu + O₂ + 4H₃PO₄ → 2Cu(H₂PO₄)₂</text>

  <text x="45" y="212" font-size="9" fill="#333" font-weight="bold">Galvanic cells form:</text>
  <text x="50" y="226" font-size="8" fill="#546e7a">Sn → Sn²⁺ + 2e⁻ (anode)</text>
  <text x="50" y="238" font-size="8" fill="#546e7a">O₂ + 2H₂O + 4e⁻ → 4OH⁻ (cathode)</text>

  <text x="45" y="256" font-size="9" fill="#333" font-weight="bold">Ionic conduction paths:</text>
  <text x="50" y="270" font-size="8" fill="#546e7a">H₃PO₄ + CO₂ + metal ions</text>
  <text x="50" y="282" font-size="8" fill="#546e7a">= conductive electrolyte film</text>

  <text x="45" y="300" font-size="9" fill="#333" font-weight="bold">ENIG pinhole undermining</text>
  <text x="45" y="316" font-size="9" fill="#333" font-weight="bold">Adhesive osmotic blistering</text>

  <!-- ═══ PHASE 2: DRYING ═══ -->
  <rect x="290" y="90" width="220" height="240" rx="6" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
  <text x="400" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Phase 2: DRYING</text>
  <text x="400" y="126" text-anchor="middle" font-size="9" fill="#ef6c00">(minutes to hours)</text>

  <!-- Evaporation icon -->
  <text x="325" y="116" font-size="12">🔥</text>

  <text x="305" y="148" font-size="9" fill="#333" font-weight="bold">Acid concentrates:</text>
  <text x="310" y="162" font-size="8" fill="#546e7a">0.06% H₃PO₄ → orders of</text>
  <text x="310" y="174" font-size="8" fill="#546e7a">magnitude higher as H₂O</text>
  <text x="310" y="186" font-size="8" fill="#546e7a">evaporates → faster etch!</text>

  <text x="305" y="206" font-size="9" fill="#333" font-weight="bold">Sticky residue film:</text>
  <text x="310" y="220" font-size="8" fill="#546e7a">Phosphate + sweeteners +</text>
  <text x="310" y="232" font-size="8" fill="#546e7a">melanoidins deposit 1–10 μm</text>

  <text x="305" y="252" font-size="9" fill="#333" font-weight="bold">Capillary retention:</text>
  <text x="310" y="266" font-size="8" fill="#546e7a">Liquid held in &lt;0.3mm gaps</text>
  <text x="310" y="278" font-size="8" fill="#546e7a">under switch — dries last</text>

  <text x="305" y="298" font-size="9" fill="#333" font-weight="bold">Dendrite nucleation begins:</text>
  <text x="310" y="312" font-size="8" fill="#546e7a">Cu → Cu²⁺ → Cu (replates)</text>

  <!-- ═══ PHASE 3: DRIED RESIDUE ═══ -->
  <rect x="520" y="90" width="250" height="240" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="645" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#b71c1c">Phase 3: DRIED</text>
  <text x="645" y="126" text-anchor="middle" font-size="9" fill="#c62828">(hours to days+)</text>

  <!-- Skull icon for danger -->
  <text x="555" y="116" font-size="12">⚠</text>

  <text x="535" y="148" font-size="9" fill="#333" font-weight="bold">Hygroscopic moisture pickup:</text>
  <text x="540" y="162" font-size="8" fill="#546e7a">H₃PO₄ residue absorbs water</text>
  <text x="540" y="174" font-size="8" fill="#546e7a">from air (>40% RH) → becomes</text>
  <text x="540" y="186" font-size="8" fill="#546e7a">conductive again without spill</text>

  <text x="535" y="206" font-size="9" fill="#333" font-weight="bold">Slow corrosion continues:</text>
  <text x="540" y="220" font-size="8" fill="#546e7a">Concentrated acid paste on Cu</text>
  <text x="540" y="232" font-size="8" fill="#546e7a">→ progressive trace thinning</text>

  <text x="535" y="252" font-size="9" fill="#333" font-weight="bold">Residue hardens:</text>
  <text x="540" y="266" font-size="8" fill="#546e7a">Melanoidins cross-link, darken</text>
  <text x="540" y="278" font-size="8" fill="#546e7a">→ harder to remove over time</text>

  <text x="535" y="298" font-size="9" fill="#333" font-weight="bold">Copper patina forms:</text>
  <text x="540" y="312" font-size="8" fill="#546e7a">Green Cu₃(PO₄)₂·Cu(OH)₂</text>
  <text x="540" y="324" font-size="8" fill="#546e7a">— porous, traps moisture</text>

  <!-- ═══ SEVERITY GRAPH (bottom) ═══ -->
  <text x="400" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Corrosion Rate vs. Time</text>

  <!-- Axes -->
  <line x1="80" y1="380" x2="80" y2="540" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="540" x2="740" y2="540" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="40" y="460" text-anchor="middle" font-size="9" fill="#333" transform="rotate(-90 40 460)">corrosion rate</text>
  <text x="740" y="558" text-anchor="end" font-size="9" fill="#333">time →</text>

  <!-- Rate labels -->
  <text x="75" y="398" text-anchor="end" font-size="8" fill="#666">high</text>
  <text x="75" y="470" text-anchor="end" font-size="8" fill="#666">med</text>
  <text x="75" y="537" text-anchor="end" font-size="8" fill="#666">low</text>

  <!-- Phase regions shaded -->
  <rect x="80" y="380" width="200" height="160" fill="#1565c0" opacity="0.06"/>
  <rect x="280" y="380" width="220" height="160" fill="#ef6c00" opacity="0.06"/>
  <rect x="500" y="380" width="220" height="160" fill="#c62828" opacity="0.06"/>

  <!-- Corrosion rate curve -->
  <path d="M 80 520 Q 120 510 160 480 Q 200 450 240 420 Q 280 395 350 390 Q 400 392 440 430 Q 480 460 520 490 Q 560 500 620 505 Q 680 508 730 510"
        fill="none" stroke="#c62828" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Annotations on curve -->
  <text x="160" y="470" text-anchor="middle" font-size="8" fill="#1565c0">initial attack</text>
  <text x="160" y="480" text-anchor="middle" font-size="8" fill="#1565c0">begins</text>
  <text x="350" y="382" text-anchor="middle" font-size="8" fill="#e65100" font-weight="bold">PEAK: acid</text>
  <text x="350" y="392" text-anchor="middle" font-size="8" fill="#e65100" font-weight="bold">concentrates</text>
  <text x="620" y="496" text-anchor="middle" font-size="8" fill="#c62828">slow but</text>
  <text x="620" y="506" text-anchor="middle" font-size="8" fill="#c62828">persistent</text>

  <!-- Key insight box -->
  <rect x="80" y="560" width="660" height="30" rx="4" fill="#fff9c4" stroke="#f9a825"/>
  <text x="400" y="580" text-anchor="middle" font-size="10" fill="#795548" font-weight="bold">⚠ Key insight: corrosion rate PEAKS during drying — concentrated acid is more aggressive than the original dilute cola</text>
</svg>
