  <text x="700" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Board 820-02757 — Illustration Zones Derived from Boardview</text>
  <text x="700" y="48" text-anchor="middle" font-size="11" fill="#666">What the committed boardview data lets us illustrate reliably vs. what still needs the separate PDF schematic</text>

