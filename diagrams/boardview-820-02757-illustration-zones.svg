  <text x="661" y="378" text-anchor="middle" font-size="24" fill="#e8e8e8">U0600</text>
  <rect x="826" y="360" width="54" height="54" fill="#9d9d9d" stroke="#d0d0d0"/>
  <rect x="792" y="334" width="28" height="28" fill="#7d7d7d" stroke="#d0d0d0"/>
